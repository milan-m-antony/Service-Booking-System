services:
  - type: web
    name: service-booking-system
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --no-input && python manage.py seed_data && python manage.py collectstatic --no-input
    startCommand: gunicorn service_booking.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

